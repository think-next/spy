<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>今日热榜 - think-next</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:oklch(0.13 0.005 260);
  --surface:oklch(0.17 0.005 260);
  --card:oklch(0.20 0.006 260);
  --border:oklch(0.27 0.006 260);
  --fg:oklch(0.92 0 0);
  --muted:oklch(0.60 0 0);
  --dim:oklch(0.42 0 0);
  --accent:oklch(0.70 0.18 25);
  --accent2:oklch(0.75 0.15 55);
  --accent3:oklch(0.70 0.12 200);
  --glow:oklch(0.60 0.15 25 / 0.12);
  --radius:0.75rem;
  --font-sans:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;position:relative;overflow-x:hidden}

/* Background texture */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,oklch(0.60 0.15 25/0.04) 0%,transparent 50%),radial-gradient(circle at 80% 80%,oklch(0.60 0.12 200/0.03) 0%,transparent 50%);pointer-events:none;z-index:0}

.container{max-width:720px;margin:0 auto;padding:0 1.5rem;position:relative;z-index:1}

/* Header */
header{text-align:center;padding:3.5rem 1rem 2rem;position:relative}
header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:1px}
header h1{font-size:2.2rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.5rem;animation:fadeDown .6s ease-out}
header h1 .fire{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header h1 .rest{color:var(--fg)}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:.8rem;animation:fadeDown .6s ease-out .1s both}
.update-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .85rem;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:.75rem;color:var(--muted);font-family:var(--font-mono);animation:fadeDown .6s ease-out .15s both}
.update-badge .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:livePulse 2s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* Nav */
.top-nav{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:100}
.top-nav a{color:var(--muted);font-size:.78rem;text-decoration:none;padding:.3rem .85rem;border:1px solid var(--border);border-radius:999px;transition:all .25s;background:oklch(0.15 0.005 260/0.8);backdrop-filter:blur(8px)}
.top-nav a:hover{color:var(--accent);border-color:var(--accent);box-shadow:0 0 20px oklch(0.60 0.15 25/0.15)}

/* Categories */
.categories{display:flex;gap:.35rem;justify-content:center;padding:1.2rem 0 1.5rem;flex-wrap:wrap;animation:fadeUp .6s ease-out .2s both}
.cat-tag{padding:.3rem .7rem;border-radius:999px;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .25s;border:1px solid transparent;background:var(--surface);color:var(--dim);user-select:none}
.cat-tag:hover{color:var(--muted);border-color:var(--border);transform:translateY(-1px)}
.cat-tag.active{color:var(--accent);border-color:var(--accent);background:oklch(0.70 0.18 25/0.08);box-shadow:0 0 12px oklch(0.70 0.18 25/0.1)}

/* News List */
.news-list{display:flex;flex-direction:column;gap:.5rem;padding-bottom:1rem}

/* News Item */
.news-item{display:flex;align-items:flex-start;gap:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;transition:all .25s ease;cursor:pointer;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.news-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,oklch(0.60 0.15 25/0.03) 0%,transparent 40%);opacity:0;transition:opacity .3s}
.news-item::after{content:'';position:absolute;top:0;left:0;bottom:0;width:2.5px;border-radius:0 2px 2px 0;transition:all .25s}
.news-item:hover{transform:translateY(-2px);border-color:oklch(0.35 0.06 25);box-shadow:0 12px 40px oklch(0 0 0/0.35)}
.news-item:hover::before{opacity:1}
.news-item:nth-child(1):hover::after{background:var(--accent)}
.news-item:nth-child(2):hover::after{background:var(--accent2)}
.news-item:nth-child(3):hover::after{background:var(--accent3)}

/* Rank */
.news-rank{display:flex;align-items:center;justify-content:center;min-width:34px;height:34px;border-radius:10px;font-weight:700;font-size:.82rem;font-family:var(--font-mono);flex-shrink:0;position:relative;z-index:1;transition:transform .25s}
.news-item:hover .news-rank{transform:scale(1.08)}
.rank-1{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 4px 12px rgba(231,76,60,.3)}
.rank-2{background:linear-gradient(135deg,#e67e22,#d35400);color:#fff;box-shadow:0 4px 12px rgba(230,126,34,.25)}
.rank-3{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff;box-shadow:0 4px 12px rgba(52,152,219,.25)}
.rank-other{background:var(--surface);color:var(--dim);border:1px solid var(--border)}

/* Body */
.news-body{flex:1;min-width:0;position:relative;z-index:1}
.news-title{font-size:.9rem;font-weight:600;margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;color:var(--fg);transition:color .2s}
.news-item:hover .news-title{color:oklch(0.95 0 0)}
.news-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.news-tag{padding:.12rem .5rem;border-radius:5px;font-size:.65rem;font-weight:600;letter-spacing:.02em;transition:transform .2s}
.news-item:hover .news-tag{transform:translateY(-1px)}
.tag-hot{background:oklch(0.70 0.18 25/0.12);color:#ff6b6b}
.tag-game{background:oklch(0.75 0.15 55/0.12);color:#ffa07a}
.tag-film{background:oklch(0.70 0.12 330/0.12);color:#ffb6c1}
.tag-music{background:oklch(0.65 0.15 300/0.12);color:#ce93d8}
.tag-sport{background:oklch(0.70 0.15 145/0.12);color:#66bb6a}
.tag-food{background:oklch(0.75 0.15 85/0.12);color:#ffd54f}
.tag-tech{background:oklch(0.65 0.12 250/0.12);color:#90caf9}
.tag-social{background:oklch(0.70 0.14 45/0.12);color:#ffb74d}
.news-source{color:var(--dim);font-size:.7rem;font-family:var(--font-mono)}
.news-sep{color:var(--border);font-size:.6rem}
.news-time{color:var(--dim);font-size:.68rem}

/* Top 3 highlight */
.news-item.top-3{border-color:oklch(0.30 0.04 260);background:linear-gradient(135deg,var(--card),oklch(0.22 0.01 260))}
.news-item.top-3 .news-title{font-size:.95rem}

/* Footer */
footer{text-align:center;padding:2.5rem 0;color:var(--dim);font-size:.78rem;border-top:1px solid var(--border);margin-top:2rem}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--accent)}

/* Animations */
@keyframes fadeDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fade-up{opacity:0;animation:fadeUp .45s ease-out forwards}

/* Empty */
.empty{text-align:center;padding:3rem;color:var(--dim);font-style:italic}

/* Responsive */
@media(max-width:640px){
  .container{padding:0 1rem}
  header{padding:2.5rem .5rem 1.5rem}
  header h1{font-size:1.6rem}
  .news-item{padding:.85rem 1rem;gap:.75rem}
  .news-rank{min-width:28px;height:28px;font-size:.75rem;border-radius:8px}
  .news-title{font-size:.85rem}
}
</style>
</head>
<body>

<div class="top-nav"><a href="/">← Home</a></div>

<div class="container">
  <header>
    <h1><span class="fire">🔥</span> <span class="rest">今日热榜</span></h1>
    <p class="subtitle">休闲娱乐 · 每日精选</p>
    <div class="update-badge"><span class="live-dot"></span><span id="updateTime">加载中...</span></div>
  </header>

  <div class="categories" id="categories">
    <span class="cat-tag active" data-cat="all">✦ 全部</span>
    <span class="cat-tag" data-cat="game">🎮 游戏</span>
    <span class="cat-tag" data-cat="film">🎬 影视</span>
    <span class="cat-tag" data-cat="music">🎵 音乐</span>
    <span class="cat-tag" data-cat="sport">⚽ 体育</span>
    <span class="cat-tag" data-cat="food">🍜 美食</span>
    <span class="cat-tag" data-cat="tech">📱 科技</span>
    <span class="cat-tag" data-cat="social">💬 社交</span>
  </div>

  <div id="newsContainer" class="news-list"></div>

  <footer><a href="/">think-next</a> · Updated Daily</footer>
</div>

<script>
const NEWS = [
  {title:"《GTA 6》发布最新预告片，确认2026年秋季发售",source:"IGN",cat:"game",tag:"游戏"},
  {title:"《艾尔登法环》DLC「黄金树幽影」全球销量突破2500万",source:"Steam",cat:"game",tag:"游戏"},
  {title:"2026年欧冠四强出炉：皇马、巴萨、曼城、拜仁上演巅峰对决",source:"ESPN",cat:"sport",tag:"体育"},
  {title:"Netflix 热播韩剧《鱿鱼游戏2》蝉联全球收视榜首",source:"Netflix",cat:"film",tag:"影视"},
  {title:"周杰伦「嘉年华」世界巡回演唱会杭州站门票3秒售罄",source:"微博",cat:"music",tag:"音乐"},
  {title:"苹果发布 iOS 26 首个公测版：全新 AI 功能惊艳亮相",source:"The Verge",cat:"tech",tag:"科技"},
  {title:"日本拉面品牌一蘭正式入驻北京，首日排队超千人",source:"大众点评",cat:"food",tag:"美食"},
  {title:"抖音宣布推出「兴趣社区」功能，对标小红书",source:"36氪",cat:"social",tag:"社交"},
  {title:"Switch 2 正式公布：支持4K输出、向下兼容全部Switch游戏",source:"Nintendo",cat:"game",tag:"游戏"},
  {title:"《封神第二部》定档暑期，乌尔善执导阵容升级",source:"猫眼",cat:"film",tag:"影视"}
];

const TAG_MAP = {hot:'tag-hot',game:'tag-game',film:'tag-film',music:'tag-music',sport:'tag-sport',food:'tag-food',tech:'tag-tech',social:'tag-social'};
let currentCat = 'all';

function getRankClass(i){return i<3?`rank-${i+1}`:'rank-other'}

function timeAgo(){const h=new Date().getHours();return h<6?'凌晨':h<12?'上午':h<14?'中午':h<18?'下午':'晚上'}

function renderNews(cat){
  const filtered=cat==='all'?NEWS:NEWS.filter(n=>n.cat===cat);
  const c=document.getElementById('newsContainer');
  if(!filtered.length){c.innerHTML='<div class="empty">该分类暂无热门消息</div>';return}
  c.innerHTML=filtered.map((item,i)=>`
    <a class="news-item fade-up${i<3?' top-3':''}" style="animation-delay:${i*50}ms"
       href="https://www.bing.com/search?q=${encodeURIComponent(item.title)}" target="_blank" rel="noopener">
      <div class="news-rank ${getRankClass(i)}">${i+1}</div>
      <div class="news-body">
        <div class="news-title">${item.title}</div>
        <div class="news-meta">
          <span class="news-tag ${TAG_MAP[item.cat]||''}">${item.tag}</span>
          <span class="news-source">${item.source}</span>
          <span class="news-sep">·</span>
          <span class="news-time">${timeAgo()}发布</span>
        </div>
      </div>
    </a>`).join('');
}

document.getElementById('categories').addEventListener('click',e=>{
  const t=e.target.closest('.cat-tag');if(!t)return;
  document.querySelectorAll('.cat-tag').forEach(el=>el.classList.remove('active'));
  t.classList.add('active');
  currentCat=t.dataset.cat;
  renderNews(currentCat);
});

const now=new Date();
const pad=n=>String(n).padStart(2,'0');
document.getElementById('updateTime').textContent=
  `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())} 更新`;

renderNews('all');
</script>
</body>
</html>
