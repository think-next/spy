<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>今日热榜 - think-next</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--fg:#e8e8f0;--muted:#666;--dim:#444;
  --accent:#ff6b6b;--accent2:#ffa07a;--accent3:#87ceeb;
  --card:#13131f;--border:#1f1f33;--surface:#16162a;
  --radius:.75rem;--font:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

.container{max-width:800px;margin:0 auto;padding:2rem 1.5rem}
header{text-align:center;padding:2rem 0 1.5rem}
header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
header p{color:var(--muted);font-size:.9rem}
.header-right{position:fixed;top:1rem;right:1.5rem;z-index:10}
.header-right a{color:var(--muted);font-size:.8rem;text-decoration:none;padding:.3rem .8rem;border:1px solid var(--border);border-radius:999px;transition:all .2s}
.header-right a:hover{color:var(--accent);border-color:var(--accent)}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:.75rem;color:var(--muted);font-family:var(--font-mono);margin-top:.5rem}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Category tags */
.categories{display:flex;gap:.4rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
.cat-tag{padding:.25rem .65rem;border-radius:999px;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid transparent}
.cat-tag.active{border-color:var(--accent);color:var(--accent);background:rgba(255,107,107,.1)}
.cat-tag:not(.active){color:var(--muted);background:var(--surface)}
.cat-tag:not(.active):hover{color:var(--fg);border-color:var(--border)}

/* News list */
.news-list{display:flex;flex-direction:column;gap:.6rem}
.news-item{display:flex;gap:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;transition:all .2s;cursor:pointer;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.news-item:hover{transform:translateY(-2px);border-color:rgba(255,107,107,.3);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.news-item::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.news-item:hover::before{opacity:1}
.news-rank{display:flex;align-items:center;justify-content:center;min-width:32px;height:32px;border-radius:8px;font-weight:700;font-size:.85rem;font-family:var(--font-mono);flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff}
.rank-2{background:linear-gradient(135deg,#ffa07a,#f0932b);color:#fff}
.rank-3{background:linear-gradient(135deg,#87ceeb,#74b9ff);color:#fff}
.rank-other{background:var(--surface);color:var(--dim);border:1px solid var(--border)}
.news-body{flex:1;min-width:0}
.news-title{font-size:.92rem;font-weight:600;margin-bottom:.25rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.news-meta{display:flex;align-items:center;gap:.6rem;color:var(--dim);font-size:.72rem;font-family:var(--font-mono)}
.news-tag{padding:.1rem .4rem;border-radius:4px;font-size:.68rem;font-weight:500}
.tag-hot{background:rgba(255,107,107,.15);color:#ff6b6b}
.tag-new{background:rgba(135,206,235,.15);color:#87ceeb}
.tag-game{background:rgba(255,160,122,.15);color:#ffa07a}
.tag-film{background:rgba(255,182,193,.15);color:#ffb6c1}
.tag-music{background:rgba(186,85,211,.15);color:#ba55d3}
.tag-sport{background:rgba(50,205,50,.15);color:#32cd32}
.tag-food{background:rgba(255,215,0,.15);color:#ffd700}
.tag-tech{background:rgba(100,149,237,.15);color:#6495ed}
.tag-social{background:rgba(255,140,0,.15);color:#ff8c00}

/* Empty & Loading */
.loading{text-align:center;padding:4rem;color:var(--muted)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--dim);font-style:italic}

/* Footer */
footer{text-align:center;padding:2rem 0;color:var(--dim);font-size:.78rem;border-top:1px solid var(--border);margin-top:2rem}
footer span{color:var(--muted)}

/* Time */
.time-label{text-align:center;margin-bottom:1.5rem;font-size:.78rem;color:var(--dim);font-family:var(--font-mono)}

/* Animations */
.fade-up{animation:fadeUp .5s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .container{padding:1rem}
  header h1{font-size:1.5rem}
  .news-item{padding:.8rem 1rem}
}
</style>
</head>
<body>
<div class="container">
  <div class="header-right"><a href="/">← Home</a></div>
  <header>
    <h1>🔥 今日热榜</h1>
    <p>休闲娱乐 · 每日精选</p>
    <div class="badge"><span class="dot"></span> <span id="updateTime">加载中...</span></div>
  </header>

  <div class="categories" id="categories">
    <span class="cat-tag active" data-cat="all">全部</span>
    <span class="cat-tag" data-cat="hot">🔥 热点</span>
    <span class="cat-tag" data-cat="game">🎮 游戏</span>
    <span class="cat-tag" data-cat="film">🎬 影视</span>
    <span class="cat-tag" data-cat="music">🎵 音乐</span>
    <span class="cat-tag" data-cat="sport">⚽ 体育</span>
    <span class="cat-tag" data-cat="food">🍜 美食</span>
    <span class="cat-tag" data-cat="tech">📱 科技</span>
    <span class="cat-tag" data-cat="social">💬 社交</span>
  </div>

  <div id="newsContainer" class="news-list">
    <div class="loading"><div class="spinner"></div><p>正在获取今日热门...</p></div>
  </div>

  <footer><span>Hot News</span> · Powered by RSSHub</footer>
</div>

<script>
const NEWS = [
  {title:"《GTA 6》发布最新预告片，确认2026年秋季发售",source:"IGN",cat:"game",tag:"游戏"},
  {title:"《艾尔登法环》DLC「黄金树幽影」全球销量突破2500万",source:"Steam",cat:"game",tag:"游戏"},
  {title:"2026年欧冠四强出炉：皇马、巴萨、曼城、拜仁上演巅峰对决",source:"ESPN",cat:"sport",tag:"体育"},
  {title:"Netflix 热播韩剧《鱿鱼游戏2》蝉联全球收视榜首",source:"Netflix",cat:"film",tag:"影视"},
  {title:"周杰伦「嘉年华」世界巡回演唱会杭州站门票3秒售罄",source:"微博",cat:"music",tag:"音乐"},
  {title:"苹果发布 iOS 26 首个公测版：全新 AI 功能惊艳亮相",source:"The Verge",cat:"tech",tag:"科技"},
  {title:"日本拉面品牌一蘭正式入驻北京，首日排队超千人",source:"大众点评",cat:"food",tag:"美食"},
  {title:"抖音宣布推出「兴趣社区」功能，对标小红书",source:"36氪",cat:"social",tag:"社交"},
  {title:"Switch 2 正式公布：支持4K输出、向下兼容全部Switch游戏",source:"Nintendo",cat:"game",tag:"游戏"},
  {title:"《封神第二部》定档暑期，乌尔善执导阵容升级",source:"猫眼",cat:"film",tag:"影视"}
];

const TAG_MAP = {hot:'tag-hot',game:'tag-game',film:'tag-film',music:'tag-music',sport:'tag-sport',food:'tag-food',tech:'tag-tech',social:'tag-social'};
let currentCat = 'all';

function getRankClass(i) {
  if (i === 0) return 'rank-1';
  if (i === 1) return 'rank-2';
  if (i === 2) return 'rank-3';
  return 'rank-other';
}

function renderNews(cat) {
  const filtered = cat === 'all' ? NEWS : NEWS.filter(n => n.cat === cat);
  const container = document.getElementById('newsContainer');

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">该分类暂无热门消息</div>';
    return;
  }

  container.innerHTML = filtered.map((item, i) => `
    <a class="news-item fade-up" style="animation-delay:${i * 60}ms" href="https://www.bing.com/search?q=${encodeURIComponent(item.title)}" target="_blank" rel="noopener">
      <div class="news-rank ${getRankClass(i)}">${i + 1}</div>
      <div class="news-body">
        <div class="news-title">${item.title}</div>
        <div class="news-meta">
          <span class="news-tag ${TAG_MAP[item.cat] || ''}">${item.tag}</span>
          <span>${item.source}</span>
          <span>·</span>
          <span>今天</span>
        </div>
      </div>
    </a>
  `).join('');
}

// Category filter
document.getElementById('categories').addEventListener('click', e => {
  const tag = e.target.closest('.cat-tag');
  if (!tag) return;
  document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
  tag.classList.add('active');
  currentCat = tag.dataset.cat;
  renderNews(currentCat);
});

// Set time
const now = new Date();
document.getElementById('updateTime').textContent =
  `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 更新`;

renderNews('all');
</script>
</body>
</html>
